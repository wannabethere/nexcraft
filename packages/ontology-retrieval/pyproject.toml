[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ontology-retrieval"
version = "0.1.0"
description = "HTTP retrieval API over the ontology-store. Exposes asset / concept / lineage / annotation reads; the v1 pipeline writes; this service reads. Vector-search (Qdrant) lands in a subsequent version."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "ontology-store>=0.1.0",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.8",
    "pyyaml>=6.0",
    "structlog>=24.0",
    "click>=8.1",
]

[project.optional-dependencies]
eval = [
    "ontology-foundry>=0.1.0",
]
dev = [
    "pytest>=8.0",
    "httpx>=0.27",
    "mypy>=1.10",
    "ruff>=0.5",
]

[project.scripts]
ontology-retrieval = "ontology_retrieval.cli:main"

[tool.uv.sources]
ontology-store = { path = "../ontology-store", editable = true }
ontology-foundry = { path = "../ontology-foundry", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["ontology_retrieval"]
