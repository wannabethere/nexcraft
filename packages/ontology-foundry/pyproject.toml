[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ontology-foundry"
version = "0.1.0"
description = "Foundational ontology analysis, extraction, and retrieval primitives."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "pydantic>=2.8",
    "structlog>=24.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
ner = [
    "spacy>=3.8",
]
huggingface = [
    "transformers>=4.44",
]
gliner = [
    "gliner>=0.2",
]
analysis = [
    "numpy>=1.26",
    "scipy>=1.11",
    "scikit-learn>=1.4",
]
llm = [
    "openai>=1.50",
]
langchain = [
    "langchain-openai>=0.2",
    "langchain-core>=0.3",
]
causal = [
    "numpy>=1.26",
    "pandas>=2.0",
    "causal-learn>=0.1.3",
    "lingam>=1.5.0",
    "dowhy>=0.11",
]
timeseries = [
    "numpy>=1.26",
    "pandas>=2.0",
    "statsmodels>=0.14",
    "tigramite>=5.0",
]
tabular = [
    "pandas>=2.0",
    "pyarrow>=14.0",
]
dev = ["pytest>=8.0", "ruff>=0.8", "numpy>=1.26", "pandas>=2.0", "pyarrow>=14.0"]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.hatch.build.targets.wheel]
packages = ["ontology_foundry"]

[tool.ruff]
line-length = 100
target-version = "py311"
