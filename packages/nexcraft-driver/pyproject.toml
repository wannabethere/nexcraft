[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nexcraft-driver"
version = "0.1.0"
description = "Flight-SQL gRPC driver fronting nexcraft sources (Postgres, Snowflake, Delta, Iceberg)."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "nexcraft>=0.1.0,<0.2",
    "pyarrow>=17.0",
    "asyncpg>=0.29",
]

[project.optional-dependencies]
postgres   = ["asyncpg>=0.29"]
snowflake  = ["snowflake-connector-python[pandas]>=3.5"]
lakehouse  = ["duckdb>=1.0", "pyiceberg>=0.7"]
all-sources = [
    "asyncpg>=0.29",
    "snowflake-connector-python[pandas]>=3.5",
    "duckdb>=1.0",
    "pyiceberg>=0.7",
]
temporal = ["temporalio>=1.7"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[project.scripts]
nexcraft-driver = "nexcraft_driver.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["nexcraft_driver"]

[tool.uv.sources]
nexcraft = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py311"
