# Nexcraft Temporal worker. Point TEMPORAL_HOST at your Temporal frontend
# (in-cluster Helm release, Temporal Cloud, or a port-forwarded service).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexcraft-staging
  namespace: nexcraft
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexcraft-worker
  namespace: nexcraft
  labels:
    app.kubernetes.io/name: nexcraft-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexcraft-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexcraft-worker
    spec:
      containers:
        - name: worker
          image: nexcraft-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TEMPORAL_HOST
              value: temporal-frontend.temporal.svc.cluster.local:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: TEMPORAL_TASK_QUEUE
              value: nexcraft-recipes
            - name: NEXCRAFT_STAGING_ROOT
              value: /var/lib/nexcraft/staging
          volumeMounts:
            - name: staging
              mountPath: /var/lib/nexcraft/staging
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: staging
          persistentVolumeClaim:
            claimName: nexcraft-staging
