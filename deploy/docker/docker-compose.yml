# Temporal dev stack (PostgreSQL persistence + PostgreSQL visibility, no Elasticsearch)
# + Nexcraft demo worker.
#
# Workflow list/search data goes to Postgres (database temporal_visibility), not ES.
# Container stdout is captured with: ./scripts/compose-logs-to-file.sh
#
# Usage: cd deploy/docker && cp .env.example .env && docker compose up --build
services:
  postgresql:
    container_name: nexcraft-temporal-postgresql
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    image: postgres:${POSTGRESQL_VERSION}
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "4"
    networks:
      - nexcraft-temporal
    expose:
      - "5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data

  temporal:
    container_name: nexcraft-temporal-frontend
    depends_on:
      - postgresql
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=false
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    image: temporalio/auto-setup:${TEMPORAL_VERSION}
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "4"
    networks:
      - nexcraft-temporal
    ports:
      - "7233:7233"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-ui:
    container_name: nexcraft-temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - nexcraft-temporal
    ports:
      - "8080:8080"

  nexcraft-worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    depends_on:
      - temporal
    environment:
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE}
      NEXCRAFT_STAGING_ROOT: ${NEXCRAFT_STAGING_ROOT}
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "4"
    networks:
      - nexcraft-temporal
    volumes:
      - nexcraft-staging:/var/lib/nexcraft/staging

networks:
  nexcraft-temporal:
    name: nexcraft-temporal
    driver: bridge

volumes:
  postgresql-data: {}
  nexcraft-staging: {}
